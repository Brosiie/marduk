name = "marduk-api"
main = "src/index.ts"
compatibility_date = "2026-05-05"
compatibility_flags = ["nodejs_compat"]

# Routes - configure these in Cloudflare dashboard or here once domain is set up
# routes = [{ pattern = "api.marduk.game/*", custom_domain = true }]

[[d1_databases]]
binding = "DB"
database_name = "marduk"
database_id = "REPLACE_AFTER_wrangler_d1_create"

[[kv_namespaces]]
binding = "RATE_LIMITS"
id = "REPLACE_AFTER_wrangler_kv_namespace_create"

[[r2_buckets]]
binding = "SAVES"
bucket_name = "marduk-saves"

[vars]
JWT_ISSUER = "marduk.game"
ALLOWED_ORIGINS = "https://marduk.game,https://app.marduk.game,http://localhost:5173"

# Secrets set via:
#   wrangler secret put JWT_SECRET
#   wrangler secret put ARGON2_PEPPER
#   wrangler secret put STRIPE_WEBHOOK_SECRET
#   wrangler secret put STRIPE_API_KEY
